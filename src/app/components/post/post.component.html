<header class="header">
  <div *ngIf="post" class="post-header">
    <div class="breadcrumbs">
      <a [routerLink]="['/categories']" class="breadcrumb-link">
        {{ post.category }}
      </a>
      <span class="breadcrumb-separator">></span>
      <a [routerLink]="['/subcategory', getCategorySlug(), getSubcategorySlug()]" class="breadcrumb-link">
        {{ post.subcategory }}
      </a>
    </div>
  </div>
</header>

<main class="post-content">
  <div *ngIf="post && post.content" 
       class="content" 
       [innerHTML]="post.content">
  </div>

  <section *ngIf="post && post.content" class="post-tags-section" aria-labelledby="post-tags-heading">
    <h2 id="post-tags-heading" class="post-tags-heading">Tags</h2>
    <div class="tags-row">
      <div class="tag-chips" *ngIf="postTags.length > 0">
        <span *ngFor="let tag of postTags" class="tag-chip">
          <a [routerLink]="['/tag', tag]" class="tag-chip-link">{{ tag }}</a>
          <button type="button" class="tag-chip-remove" (click)="removeTag(tag)" [attr.aria-label]="'Remove tag ' + tag">×</button>
        </span>
      </div>
      <button
        type="button"
        class="tag-add-toggle"
        (click)="toggleTagInput()"
        [attr.aria-label]="showTagInput ? 'Cancel adding tag' : 'Add tag'"
        [title]="showTagInput ? 'Cancel' : 'Add tag'">
        +
      </button>
    </div>
    <div class="tag-add-controls" *ngIf="showTagInput">
      <div class="tag-add-row">
        <input
          #tagInput
          type="text"
          class="tag-input"
          [(ngModel)]="newTagInput"
          list="post-tags-datalist"
          placeholder="New or existing tag"
          (keydown.enter)="$event.preventDefault(); addTag()"
        />
        <datalist id="post-tags-datalist">
          <option *ngFor="let t of tagsForDatalist" [value]="t"></option>
        </datalist>
        <button type="button" class="tag-add-btn" (click)="addTag()">Add</button>
      </div>
    </div>
  </section>

  <nav *ngIf="post && post.content && (prevPost || nextPost)"
       class="post-nav"
       aria-label="Предыдущая и следующая статья">
    <a *ngIf="prevPost as p"
       [routerLink]="['/post', p.slug]"
       class="post-nav-btn"
       aria-label="Предыдущая статья">←</a>
    <span *ngIf="!prevPost"
          class="post-nav-btn post-nav-btn--placeholder"
          aria-hidden="true"></span>
    <a *ngIf="nextPost as n"
       [routerLink]="['/post', n.slug]"
       class="post-nav-btn"
       aria-label="Следующая статья">→</a>
    <span *ngIf="!nextPost"
          class="post-nav-btn post-nav-btn--placeholder"
          aria-hidden="true"></span>
  </nav>
  
  <div *ngIf="!post && !loading" class="not-found">
    <h2>Post Not Found</h2>
    <p>The post you're looking for doesn't exist or has been moved.</p>
    <a routerLink="/" class="home-link">Go back to home</a>
  </div>

  <div *ngIf="loading" class="loading">
    <p>Loading post...</p>
  </div>
</main>

<app-image-viewer 
  *ngIf="showImageViewer" 
  [imageUrl]="selectedImageUrl"
  (close)="closeImageViewer()">
</app-image-viewer>
