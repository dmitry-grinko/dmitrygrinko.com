<header class="header" [class.search-expanded]="isSearchExpanded">
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <a routerLink="/" class="logo-link">
        <span class="logo-text">ML Systems Notes</span>
      </a>
    </div>

    <!-- Right side navigation -->
    <div class="nav-right">
      <!-- Blog Dropdown -->
      <div class="categories-dropdown">
        <button 
          class="categories-btn"
          (click)="toggleCategoriesDropdown()"
          type="button"
        >
          Blog
          <span class="dropdown-arrow" [class.open]="isCategoriesOpen">▼</span>
        </button>
      
      <div class="categories-menu" [class.open]="isCategoriesOpen">
        <div *ngFor="let category of getCategoriesWithSubcategories()" class="category-group">
          <div class="category-header">
            <button 
              class="category-toggle"
              (click)="toggleCategory(category.name)"
              type="button"
            >
              <span class="category-arrow" [class.open]="isCategoryExpanded(category.name)">▶</span>
              <span class="category-name">{{ category.name }}</span>
              <span *ngIf="category.completed" class="completion-check" aria-label="All topics in this stage completed" title="All topics in this stage completed">✓</span>
              <span class="category-count">({{ category.count }})</span>
            </button>
          </div>
          <div class="subcategories-list" [class.expanded]="isCategoryExpanded(category.name)">
            <a *ngFor="let subcategory of category.subcategories"
               [routerLink]="['/subcategory', category.slug, subcategory.slug]"
               class="subcategory-item"
               (click)="closeCategoriesDropdown()">
              <span class="subcategory-item-text">{{ subcategory.name }} ({{ subcategory.count }})</span>
              <span *ngIf="subcategory.completed" class="completion-check" aria-label="All posts in this section written" title="All posts in this section written">✓</span>
            </a>
          </div>
        </div>
      </div>
    </div>

      <!-- Tags (local storage) -->
      <div *ngIf="tagsMenu.length > 0" class="tags-dropdown">
        <button
          class="tags-btn"
          type="button"
          (click)="toggleTagsDropdown()"
          [attr.aria-expanded]="isTagsOpen"
        >
          Tags
          <span class="dropdown-arrow" [class.open]="isTagsOpen">▼</span>
        </button>
        <div class="tags-menu" [class.open]="isTagsOpen">
          <a
            *ngFor="let tag of tagsMenu"
            [routerLink]="['/tag', tag]"
            class="tags-menu-item"
            (click)="closeTagsDropdown()"
          >{{ tag }}</a>
          <div class="tags-menu-separator" role="separator" aria-hidden="true"></div>
          <button
            type="button"
            class="tags-menu-reset"
            (click)="resetAllTags()"
          >Reset</button>
        </div>
      </div>

      <!-- Theme Toggle -->
      <button 
        class="theme-toggle-btn"
        (click)="toggleTheme()"
        type="button"
        [attr.aria-label]="getThemeLabel()"
        [title]="getThemeLabel()"
      >
        {{ getThemeIcon() }}
      </button>

      <!-- Help Link -->
      <a routerLink="/help" class="help-link" title="Help & Shortcuts">
        <span class="help-icon">?</span>
      </a>

      <!-- Search -->
      <div class="search-container">
        <button 
          class="search-icon-btn"
          [class.hidden]="isSearchExpanded"
          (click)="expandSearch()"
          type="button"
          aria-label="Open search (Ctrl+S)"
          title="Search (Ctrl+S)"
        >
          🔍
        </button>
        <input 
          #searchInput
          type="search"
          class="search-input"
          [class.expanded]="isSearchExpanded"
          placeholder="Search posts..."
          [(ngModel)]="searchQuery"
          (input)="onSearch()"
          (keyup.enter)="performSearch()"
          (blur)="onSearchBlur()"
          autocomplete="off"
          role="searchbox"
          aria-label="Search blog posts"
        >
      </div>
    </div>

  </div>

  <!-- Search Overlay -->
  <div 
    class="search-overlay" 
    [class.visible]="isSearchExpanded && searchResults.length > 0 && searchQuery.length > 0"
    (click)="clearSearch()"
  ></div>

  <!-- Search Results Dropdown -->
  <div 
    class="search-results" 
    [class.visible]="isSearchExpanded && searchResults.length > 0 && searchQuery.length > 0"
  >
    <div class="search-results-container">
      <div class="search-results-header">
        <span>Search Results ({{ searchResults.length }})</span>
        <span 
          class="close-search"
          (click)="clearSearch()"
          aria-label="Clear search"
        >×</span>
      </div>
      <div class="search-results-list">
        <a 
          *ngFor="let post of searchResults; let i = index" 
          [routerLink]="['/post', post.slug]"
          class="search-result-item"
          [attr.data-search-index]="i"
          [class.focused]="isSearchResultFocused(i)"
          (click)="clearSearch()"
        >
          <h4>{{ post.title }}</h4>
          <p>{{ post.excerpt }}</p>
        </a>
      </div>
    </div>
  </div>
</header>
